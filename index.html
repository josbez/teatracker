<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Theemaas">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#243B1A">
  <meta name="description" content="Persoonlijk theejournaal — houd bij welke theeën je hebt geproefd.">
  <title>Theemaas Dagboek</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:      #FAF6EF;
      --cream-2:    #F4EEE3;
      --paper:      #EEE6D8;
      --green:      #20371A;
      --green-mid:  #3A5E28;
      --green-soft: #E9F1E0;
      --amber:      #B5862F;
      --amber-soft: #FBF1DC;
      --red:        #A23A33;
      --red-soft:   #F8E9E6;
      --text:       #271F1A;
      --muted:      #8C8378;
      --faint:      #B7AEA1;
      --border:     #E6DCCD;
      --white:      #FFFFFF;

      --r-card: 20px;
      --r-pill: 999px;
      --r-sheet: 26px;

      --sh-sm: 0 1px 2px rgba(32,55,26,0.05);
      --sh-md: 0 2px 6px rgba(32,55,26,0.05), 0 14px 30px -18px rgba(32,55,26,0.22);
      --sh-lg: 0 8px 20px rgba(32,55,26,0.10), 0 30px 60px -24px rgba(32,55,26,0.34);
      --sh-fab: 0 6px 16px rgba(32,55,26,0.30), 0 2px 5px rgba(32,55,26,0.20);

      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background:
        radial-gradient(120% 60% at 50% -10%, rgba(58,94,40,0.06), transparent 60%),
        var(--cream);
      color: var(--text);
      min-height: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 96px);
      position: relative;
      overflow-x: hidden;
    }

    ::selection { background: var(--green-soft); }

    /* ── Header / masthead ── */
    header {
      position: relative;
      background:
        radial-gradient(140% 120% at 85% -20%, rgba(181,134,47,0.22), transparent 55%),
        linear-gradient(168deg, #2A4520 0%, var(--green) 70%);
      color: var(--cream);
      padding: calc(env(safe-area-inset-top, 0px) + 30px) 24px 30px;
      border-radius: 0 0 28px 28px;
      box-shadow: 0 18px 40px -28px rgba(32,55,26,0.7);
      overflow: hidden;
    }
    header::after {
      content: "";
      position: absolute;
      right: -40px; top: -50px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(250,246,239,0.10), transparent 65%);
      pointer-events: none;
    }

    .brand { display: flex; align-items: center; gap: 11px; }
    .brand .mark {
      width: 42px; height: 42px; flex-shrink: 0;
      display: grid; place-items: center;
      font-size: 24px;
      background: rgba(250,246,239,0.12);
      border: 1px solid rgba(250,246,239,0.18);
      border-radius: 13px;
      backdrop-filter: blur(4px);
    }
    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 27px;
      font-weight: 600;
      letter-spacing: 0.2px;
      line-height: 1;
    }
    .brand .sub {
      font-size: 11px;
      font-weight: 400;
      opacity: 0.62;
      margin-top: 4px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    .refresh-btn {
      position: absolute;
      right: 20px;
      top: calc(env(safe-area-inset-top, 0px) + 30px);
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(250,246,239,0.22);
      background: rgba(250,246,239,0.10);
      color: var(--cream);
      font-size: 18px; line-height: 1;
      cursor: pointer;
      display: grid; place-items: center;
      transition: background 0.18s, transform 0.5s var(--ease-out);
    }
    .refresh-btn:active { background: rgba(250,246,239,0.2); }
    .refresh-btn.spinning { animation: spin 0.7s var(--ease-out); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Stats band ── */
    .stats {
      margin: -16px 16px 0;
      position: relative;
      z-index: 2;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      box-shadow: var(--sh-md);
      padding: 17px 19px 18px;
      transition: opacity 0.3s, transform 0.3s;
    }
    .stats.hidden { display: none; }
    .stats-head { display: flex; align-items: baseline; gap: 9px; }
    .stats-num {
      font-family: 'Playfair Display', serif;
      font-size: 30px; font-weight: 700;
      color: var(--green); line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .stats-label { font-size: 13px; color: var(--muted); font-weight: 400; }
    .stats-fav {
      margin-left: auto;
      font-size: 12px; color: var(--green-mid); font-weight: 500;
      background: var(--green-soft); border-radius: var(--r-pill);
      padding: 4px 11px;
    }
    .stats-bar {
      display: flex; gap: 3px; height: 9px;
      margin: 14px 0 11px;
      border-radius: var(--r-pill); overflow: hidden;
      background: var(--cream-2);
    }
    .stats-bar i {
      width: 0; border-radius: var(--r-pill);
      transition: width 0.7s var(--ease-out);
    }
    .stats-bar .up   { background: linear-gradient(90deg, #4F7A36, var(--green-mid)); }
    .stats-bar .mid  { background: linear-gradient(90deg, #CFA24A, var(--amber)); }
    .stats-bar .down { background: linear-gradient(90deg, #BB554D, var(--red)); }
    .stats-legend { display: flex; gap: 16px; font-size: 12px; color: var(--muted); }
    .stats-legend b { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
    .stats-legend .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
    .dot.up { background: var(--green-mid); } .dot.mid { background: var(--amber); } .dot.down { background: var(--red); }

    /* ── Filters ── */
    .filters {
      position: sticky; top: 0; z-index: 20;
      background: rgba(250,246,239,0.86);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 13px 0 11px;
      margin-top: 18px;
      border-bottom: 1px solid var(--border);
    }
    .seg-rating {
      display: flex; gap: 4px;
      margin: 0 16px 10px;
      background: var(--cream-2);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      padding: 4px;
    }
    .seg-rating button {
      flex: 1;
      border: none; background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500; color: var(--muted);
      padding: 8px 4px; border-radius: var(--r-pill);
      cursor: pointer;
      transition: color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.12s;
    }
    .seg-rating button:active { transform: scale(0.94); }
    .seg-rating button.active {
      background: var(--white); color: var(--green);
      box-shadow: var(--sh-sm); font-weight: 600;
    }

    .type-row {
      display: flex; gap: 7px;
      padding: 1px 16px;
      overflow-x: auto;
      -ms-overflow-style: none; scrollbar-width: none;
    }
    .type-row::-webkit-scrollbar { display: none; }
    .type-pill {
      flex-shrink: 0;
      padding: 7px 13px;
      border-radius: var(--r-pill);
      border: 1.5px solid var(--border);
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px; font-weight: 500;
      color: var(--text); white-space: nowrap; cursor: pointer;
      transition: all 0.18s var(--ease-out);
    }
    .type-pill:active { transform: scale(0.95); }
    .type-pill.active {
      background: var(--green); color: var(--cream);
      border-color: var(--green); box-shadow: var(--sh-sm);
    }

    /* ── List ── */
    .list-wrap { padding: 16px 16px 0; }
    .count {
      font-size: 11.5px; color: var(--muted); font-weight: 500;
      letter-spacing: 1.4px; text-transform: uppercase;
      margin-bottom: 13px; min-height: 14px;
    }

    .card {
      position: relative;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      box-shadow: var(--sh-md);
      padding: 16px 16px 16px 19px;
      margin-bottom: 11px;
      display: flex; align-items: flex-start; gap: 13px;
      overflow: hidden;
      animation: cardIn 0.5s var(--ease-spring) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-rail {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; border-radius: var(--r-pill);
    }
    .card.r-up   .card-rail { background: linear-gradient(var(--green-mid), #4F7A36); }
    .card.r-mid  .card-rail { background: linear-gradient(var(--amber), #CFA24A); }
    .card.r-down .card-rail { background: linear-gradient(var(--red), #BB554D); }

    .card-badge {
      width: 44px; height: 44px; flex-shrink: 0;
      display: grid; place-items: center;
      font-size: 23px; line-height: 1;
      border-radius: 14px;
    }
    .card.r-up   .card-badge { background: var(--green-soft); }
    .card.r-mid  .card-badge { background: var(--amber-soft); }
    .card.r-down .card-badge { background: var(--red-soft); }

    .card-main { flex: 1; min-width: 0; }
    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 17.5px; font-weight: 600;
      line-height: 1.25; color: var(--text);
      margin-bottom: 5px; word-break: break-word;
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
    .card-tag {
      font-size: 11.5px; color: var(--green-mid); font-weight: 500;
      background: var(--green-soft); border-radius: var(--r-pill);
      padding: 3px 9px; white-space: nowrap;
    }
    .card-note {
      font-size: 13.5px; color: var(--muted); line-height: 1.5;
      margin-bottom: 7px; word-break: break-word;
    }
    .card-date {
      display: block;
      font-size: 11px; color: var(--faint); font-weight: 400;
      letter-spacing: 0.4px;
    }
    .card-pending { color: var(--amber); font-weight: 600; margin-left: 7px; }

    .card-del {
      background: none; border: none; color: var(--border);
      cursor: pointer; font-size: 19px; line-height: 1;
      width: 30px; height: 30px; border-radius: 50%;
      flex-shrink: 0; display: grid; place-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .card-del:hover { color: var(--red); background: var(--red-soft); }

    /* Inline delete confirm */
    .card-confirm {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, var(--red-soft), #FBEEEB);
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 0 18px;
      animation: sweepIn 0.22s var(--ease-out) both;
    }
    @keyframes sweepIn { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }
    .card-confirm span { font-size: 13.5px; font-weight: 600; color: var(--red); }
    .confirm-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .card-confirm button {
      border: none; border-radius: 10px; padding: 9px 15px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: transform 0.1s;
    }
    .card-confirm button:active { transform: scale(0.95); }
    .btn-confirm-yes { background: var(--red); color: var(--cream); }
    .btn-confirm-no  { background: var(--white); color: var(--text); border: 1px solid var(--border) !important; }

    /* ── Empty / skeleton ── */
    .empty { text-align: center; padding: 60px 24px; color: var(--muted); animation: cardIn 0.5s var(--ease-out) both; }
    .empty .e-icon { font-size: 46px; margin-bottom: 16px; opacity: 0.8; }
    .empty p { font-size: 15px; font-weight: 400; line-height: 1.55; }
    .empty .e-cta { margin-top: 4px; font-size: 13.5px; color: var(--green-mid); font-weight: 500; }

    .skeleton-card {
      background: var(--white); border-radius: var(--r-card);
      padding: 16px 16px 16px 19px; margin-bottom: 11px;
      border: 1px solid var(--border); box-shadow: var(--sh-sm);
      display: flex; gap: 13px; align-items: center;
    }
    .sk { background: var(--cream-2); border-radius: 7px; position: relative; overflow: hidden; }
    .sk::after {
      content: ""; position: absolute; inset: 0; transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.65), transparent);
      animation: shimmer 1.3s infinite;
    }
    @keyframes shimmer { 100% { transform: translateX(100%); } }
    .sk-badge { width: 44px; height: 44px; border-radius: 14px; flex-shrink: 0; }
    .sk-line { height: 13px; }
    .sk-line.w1 { width: 50%; margin-bottom: 9px; }
    .sk-line.w2 { width: 78%; }

    /* ── FAB ── */
    .fab {
      position: fixed;
      left: 50%; transform: translateX(calc(240px - 50% - 20px));
      bottom: calc(env(safe-area-inset-bottom, 0px) + 22px);
      width: 60px; height: 60px; border-radius: 20px;
      background: linear-gradient(155deg, #3A5E28, var(--green));
      color: var(--cream); border: none;
      font-size: 30px; font-weight: 300; line-height: 1;
      display: grid; place-items: center; cursor: pointer;
      box-shadow: var(--sh-fab);
      z-index: 50;
      transition: transform 0.4s var(--ease-spring), box-shadow 0.2s, opacity 0.25s;
    }
    .fab span { display: block; transition: transform 0.4s var(--ease-spring); }
    .fab:active { transform: translateX(calc(240px - 50% - 20px)) scale(0.92); }
    .fab.hidden { opacity: 0; pointer-events: none; transform: translateX(calc(240px - 50% - 20px)) scale(0.4); }
    @media (max-width: 520px) {
      .fab, .fab:active { transform: none; right: 20px; left: auto; }
      .fab:active { transform: scale(0.92); }
      .fab.hidden { transform: scale(0.4); }
    }

    /* ── Bottom sheet ── */
    .backdrop {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(32,28,22,0.42);
      backdrop-filter: blur(2px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.32s var(--ease-out);
    }
    .backdrop.open { opacity: 1; pointer-events: auto; }

    .sheet {
      position: fixed; left: 50%; bottom: 0; z-index: 70;
      width: 100%; max-width: 480px;
      transform: translateX(-50%) translateY(100%);
      background: var(--cream);
      border-radius: var(--r-sheet) var(--r-sheet) 0 0;
      box-shadow: var(--sh-lg);
      padding: 10px 22px calc(env(safe-area-inset-bottom, 0px) + 26px);
      max-height: 92vh; overflow-y: auto;
      transition: transform 0.42s var(--ease-spring);
    }
    .sheet.open { transform: translateX(-50%) translateY(0); }
    .sheet-handle {
      width: 40px; height: 5px; border-radius: var(--r-pill);
      background: var(--border); margin: 6px auto 16px;
    }
    .sheet-title {
      font-family: 'Playfair Display', serif;
      font-size: 21px; font-weight: 600; color: var(--green);
      margin-bottom: 18px;
    }
    .sheet-title em { font-style: italic; font-weight: 500; }

    .field-label {
      font-size: 11.5px; color: var(--muted); font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      margin: 4px 0 9px;
    }

    input[type="text"], textarea {
      width: 100%; padding: 14px 15px;
      border: 1.5px solid var(--border); border-radius: 13px;
      font-family: 'DM Sans', sans-serif; font-size: 15.5px;
      background: var(--white); color: var(--text);
      -webkit-appearance: none; appearance: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    input[type="text"]::placeholder, textarea::placeholder { color: #C9BEAE; }
    input[type="text"]:focus, textarea:focus {
      outline: none; border-color: var(--green-mid);
      box-shadow: 0 0 0 4px var(--green-soft);
    }
    .name-input { font-size: 17px; margin-bottom: 20px; }
    textarea { height: 76px; resize: none; line-height: 1.5; margin-top: 2px; }

    .type-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
    .type-chip {
      padding: 9px 14px; border-radius: var(--r-pill);
      border: 1.5px solid var(--border); background: var(--white);
      font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 500;
      color: var(--text); white-space: nowrap; cursor: pointer; user-select: none;
      transition: transform 0.14s var(--ease-spring), background 0.16s, color 0.16s, border-color 0.16s;
    }
    .type-chip:active { transform: scale(0.93); }
    .type-chip.selected {
      background: var(--green); color: var(--cream); border-color: var(--green);
      transform: scale(1.04);
    }

    .rating-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; margin-bottom: 22px; }
    .rating-btn {
      padding: 15px 6px 12px;
      border: 2px solid var(--border); border-radius: 16px;
      background: var(--white); cursor: pointer; user-select: none;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      transition: transform 0.14s var(--ease-spring), border-color 0.16s, background 0.16s;
    }
    .rating-btn:active { transform: scale(0.95); }
    .rating-btn .emoji { font-size: 27px; line-height: 1; transition: transform 0.3s var(--ease-spring); }
    .rating-btn .label { font-size: 11.5px; color: var(--muted); font-weight: 500; }
    .rating-btn.selected { transform: translateY(-2px); }
    .rating-btn.selected .emoji { transform: scale(1.18); }
    .rating-btn.selected[data-rating="👍"] { border-color: var(--green-mid); background: var(--green-soft); }
    .rating-btn.selected[data-rating="😐"] { border-color: var(--amber);     background: var(--amber-soft); }
    .rating-btn.selected[data-rating="👎"] { border-color: var(--red);       background: var(--red-soft); }
    .rating-btn.selected[data-rating="👍"] .label { color: var(--green-mid); font-weight: 600; }
    .rating-btn.selected[data-rating="😐"] .label { color: var(--amber);     font-weight: 600; }
    .rating-btn.selected[data-rating="👎"] .label { color: var(--red);       font-weight: 600; }

    .btn-save {
      width: 100%; padding: 16px;
      background: linear-gradient(155deg, #3A5E28, var(--green));
      color: var(--cream); border: none; border-radius: 14px;
      font-family: 'DM Sans', sans-serif; font-size: 15.5px; font-weight: 600;
      letter-spacing: 0.2px; cursor: pointer;
      box-shadow: var(--sh-md);
      transition: transform 0.12s, opacity 0.15s;
    }
    .btn-save:active { transform: scale(0.985); opacity: 0.92; }
    .btn-save:disabled { opacity: 0.5; }

    /* ── Offline banner ── */
    .banner {
      display: none; text-align: center;
      background: var(--amber-soft); color: var(--amber);
      font-size: 12.5px; font-weight: 600;
      padding: 8px 20px; letter-spacing: 0.2px;
    }
    .banner.show { display: block; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 28px);
      left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--green); color: var(--cream);
      padding: 12px 22px; border-radius: var(--r-pill);
      font-size: 14px; font-weight: 500;
      transition: transform 0.36s var(--ease-spring);
      z-index: 999; white-space: nowrap; pointer-events: none;
      box-shadow: var(--sh-lg);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
      .stats-bar i { transition: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="mark">🍵</div>
    <div>
      <h1>Theemaas</h1>
      <div class="sub">Theejournaal</div>
    </div>
  </div>
  <button class="refresh-btn" id="refreshBtn" type="button" aria-label="Ververs lijst" title="Ververs">↻</button>
</header>

<section class="stats hidden" id="stats" aria-live="polite">
  <div class="stats-head">
    <span class="stats-num" id="statsNum">0</span>
    <span class="stats-label">theeën geproefd</span>
    <span class="stats-fav" id="statsFav" hidden></span>
  </div>
  <div class="stats-bar" id="statsBar">
    <i class="up"></i><i class="mid"></i><i class="down"></i>
  </div>
  <div class="stats-legend">
    <span><span class="dot up"></span><b id="legUp">0</b> lekker</span>
    <span><span class="dot mid"></span><b id="legMid">0</b> zo-zo</span>
    <span><span class="dot down"></span><b id="legDown">0</b> niet</span>
  </div>
</section>

<div class="banner" id="banner"></div>

<div class="filters">
  <div class="seg-rating" id="ratingFilterBar" role="tablist" aria-label="Filter op beoordeling">
    <button class="active" type="button" data-filter="all">Alle</button>
    <button type="button" data-filter="👍" aria-label="Lekker">👍</button>
    <button type="button" data-filter="😐" aria-label="Zo-zo">😐</button>
    <button type="button" data-filter="👎" aria-label="Niet lekker">👎</button>
  </div>
  <div class="type-row" id="typeFilterBar">
    <button class="type-pill active" type="button" data-type-filter="all">Alle soorten</button>
    <button class="type-pill" type="button" data-type-filter="Groen">🌿 Groen</button>
    <button class="type-pill" type="button" data-type-filter="Zwart">🖤 Zwart</button>
    <button class="type-pill" type="button" data-type-filter="Oolong">🌸 Oolong</button>
    <button class="type-pill" type="button" data-type-filter="Wit">🤍 Wit</button>
    <button class="type-pill" type="button" data-type-filter="Jasmijn">🌺 Jasmijn</button>
    <button class="type-pill" type="button" data-type-filter="Kruiden">🌱 Kruiden</button>
    <button class="type-pill" type="button" data-type-filter="Rooibos">❤️ Rooibos</button>
    <button class="type-pill" type="button" data-type-filter="Pu-erh">🍂 Pu-erh</button>
  </div>
</div>

<div class="list-wrap">
  <div class="count" id="count"></div>
  <div id="teaList" aria-live="polite"></div>
</div>

<button class="fab" id="fab" type="button" aria-label="Thee toevoegen"><span>+</span></button>

<div class="backdrop" id="backdrop"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
  <div class="sheet-handle"></div>
  <h2 class="sheet-title" id="sheetTitle">Nieuwe thee <em>proeven</em></h2>

  <input type="text" id="naam" class="name-input" placeholder="Naam van de thee…" autocomplete="off" autocorrect="off" spellcheck="false">

  <div class="field-label">Soort</div>
  <div class="type-chips" id="typeChips">
    <button class="type-chip" type="button" data-type="Groen"   aria-pressed="false">🌿 Groen</button>
    <button class="type-chip" type="button" data-type="Zwart"   aria-pressed="false">🖤 Zwart</button>
    <button class="type-chip" type="button" data-type="Oolong"  aria-pressed="false">🌸 Oolong</button>
    <button class="type-chip" type="button" data-type="Wit"     aria-pressed="false">🤍 Wit</button>
    <button class="type-chip" type="button" data-type="Jasmijn" aria-pressed="false">🌺 Jasmijn</button>
    <button class="type-chip" type="button" data-type="Kruiden" aria-pressed="false">🌱 Kruiden</button>
    <button class="type-chip" type="button" data-type="Rooibos" aria-pressed="false">❤️ Rooibos</button>
    <button class="type-chip" type="button" data-type="Pu-erh"  aria-pressed="false">🍂 Pu-erh</button>
  </div>

  <div class="field-label">Hoe was 'ie?</div>
  <div class="rating-row" id="ratingRow">
    <button class="rating-btn" type="button" data-rating="👍" aria-pressed="false">
      <span class="emoji">👍</span><span class="label">Lekker</span>
    </button>
    <button class="rating-btn" type="button" data-rating="😐" aria-pressed="false">
      <span class="emoji">😐</span><span class="label">Zo-zo</span>
    </button>
    <button class="rating-btn" type="button" data-rating="👎" aria-pressed="false">
      <span class="emoji">👎</span><span class="label">Niet lekker</span>
    </button>
  </div>

  <div class="field-label">Notitie</div>
  <textarea id="notitie" placeholder="Smaak, geur, moment… (optioneel)"></textarea>

  <button class="btn-save" id="saveBtn" type="button" style="margin-top:20px">Opslaan in journaal</button>
</div>

<div class="toast" id="toast"></div>

<script>
  'use strict';

  // ⚠️ Vervang dit door jouw eigen Apps Script URL.
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx7GxpM5wqeBOWm1vhyyqvdnQuiu42ruFOyACrSLrqzKOSeT-283U66AFASrWGo10p1og/exec';

  const CACHE_KEY = 'theemaas:teas';
  const QUEUE_KEY = 'theemaas:queue';
  const FILTER_KEY = 'theemaas:filters';

  const TYPE_EMOJI = {
    Groen: '🌿', Zwart: '🖤', Oolong: '🌸', Wit: '🤍',
    Jasmijn: '🌺', Kruiden: '🌱', Rooibos: '❤️', 'Pu-erh': '🍂'
  };
  const RATING_CLASS = { '👍': 'r-up', '😐': 'r-mid', '👎': 'r-down' };

  let allTeas = [];
  let queue = [];
  let selectedRating = null;
  let selectedType   = null;
  let currentFilter  = 'all';
  let currentTypeFilter = 'all';
  let confirmingId = null;
  let lastFocus = null;

  // ── Storage ──
  function loadStore(key, fallback) {
    try { const v = JSON.parse(localStorage.getItem(key)); return v == null ? fallback : v; }
    catch (_) { return fallback; }
  }
  function saveStore(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch (_) {} }
  const cacheTeas = () => saveStore(CACHE_KEY, allTeas);
  const saveQueue = () => saveStore(QUEUE_KEY, queue);
  const pendingIds = () => new Set(queue.filter(q => q.op === 'add').map(q => q.tea.id));

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function cssEsc(s) {
    return (window.CSS && CSS.escape) ? CSS.escape(s) : String(s).replace(/["\\]/g, '\\$&');
  }

  // ── Toast ──
  let toastTimer = null;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
  }

  // ── Banner ──
  function updateBanner() {
    const banner = document.getElementById('banner');
    const pending = queue.length;
    if (!navigator.onLine && pending) {
      banner.textContent = `Offline — ${pending} wijziging${pending !== 1 ? 'en' : ''} wachten op verbinding`;
      banner.classList.add('show');
    } else if (!navigator.onLine) {
      banner.textContent = 'Offline — wijzigingen syncen zodra je weer online bent';
      banner.classList.add('show');
    } else if (pending) {
      banner.textContent = `Synchroniseren… (${pending})`;
      banner.classList.add('show');
    } else {
      banner.classList.remove('show');
    }
  }

  // ── Selecties (sheet) ──
  function selectType(btn) {
    const already = btn.classList.contains('selected');
    document.querySelectorAll('.type-chip').forEach(b => { b.classList.remove('selected'); b.setAttribute('aria-pressed', 'false'); });
    if (!already) { btn.classList.add('selected'); btn.setAttribute('aria-pressed', 'true'); selectedType = btn.dataset.type; }
    else selectedType = null;
  }
  function selectRating(btn) {
    document.querySelectorAll('.rating-btn').forEach(b => { b.classList.remove('selected'); b.setAttribute('aria-pressed', 'false'); });
    btn.classList.add('selected'); btn.setAttribute('aria-pressed', 'true');
    selectedRating = btn.dataset.rating;
  }

  // ── Filters ──
  function setFilter(btn) {
    document.querySelectorAll('#ratingFilterBar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    persistFilters(); renderList();
  }
  function setTypeFilter(btn) {
    document.querySelectorAll('#typeFilterBar .type-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTypeFilter = btn.dataset.typeFilter;
    persistFilters(); renderList();
  }
  function persistFilters() { saveStore(FILTER_KEY, { rating: currentFilter, type: currentTypeFilter }); }
  function restoreFilters() {
    const f = loadStore(FILTER_KEY, null); if (!f) return;
    currentFilter = f.rating || 'all'; currentTypeFilter = f.type || 'all';
    document.querySelectorAll('#ratingFilterBar button').forEach(b => b.classList.toggle('active', b.dataset.filter === currentFilter));
    document.querySelectorAll('#typeFilterBar .type-pill').forEach(b => b.classList.toggle('active', b.dataset.typeFilter === currentTypeFilter));
  }

  // ── Stats ──
  function renderStats() {
    const stats = document.getElementById('stats');
    const n = allTeas.length;
    if (n === 0) { stats.classList.add('hidden'); return; }
    stats.classList.remove('hidden');

    const up   = allTeas.filter(t => t.rating === '👍').length;
    const mid  = allTeas.filter(t => t.rating === '😐').length;
    const down = allTeas.filter(t => t.rating === '👎').length;

    document.getElementById('statsNum').textContent = n;
    document.getElementById('legUp').textContent = up;
    document.getElementById('legMid').textContent = mid;
    document.getElementById('legDown').textContent = down;

    const fav = document.getElementById('statsFav');
    if (up > 0) { fav.hidden = false; fav.textContent = Math.round((up / n) * 100) + '% lekker'; }
    else fav.hidden = true;

    const bar = document.getElementById('statsBar').children;
    requestAnimationFrame(() => {
      bar[0].style.width = (up / n * 100) + '%';
      bar[1].style.width = (mid / n * 100) + '%';
      bar[2].style.width = (down / n * 100) + '%';
    });
  }

  // ── Skeleton ──
  function showSkeleton() {
    document.getElementById('teaList').innerHTML = Array.from({ length: 4 }).map(() => `
      <div class="skeleton-card">
        <div class="sk sk-badge"></div>
        <div style="flex:1"><div class="sk sk-line w1"></div><div class="sk sk-line w2"></div></div>
      </div>`).join('');
  }

  // ── Render list ──
  function renderList() {
    renderStats();
    const pend = pendingIds();
    let filtered = allTeas;
    if (currentFilter !== 'all')     filtered = filtered.filter(t => t.rating === currentFilter);
    if (currentTypeFilter !== 'all') filtered = filtered.filter(t => t.soort  === currentTypeFilter);

    const list = document.getElementById('teaList');

    if (filtered.length === 0) {
      const blank = allTeas.length === 0;
      list.innerHTML = `
        <div class="empty">
          <div class="e-icon">${blank ? '🍃' : '🔍'}</div>
          <p>${blank ? 'Je journaal is nog leeg.' : 'Geen theeën in deze selectie.'}</p>
          ${blank ? '<p class="e-cta">Tik op + om je eerste thee toe te voegen</p>' : ''}
        </div>`;
    } else {
      list.innerHTML = filtered.map((t, i) => `
        <article class="card ${RATING_CLASS[t.rating] || ''}" data-id="${esc(t.id)}" style="animation-delay:${Math.min(i, 14) * 45}ms">
          <span class="card-rail"></span>
          <div class="card-badge">${esc(t.rating)}</div>
          <div class="card-main">
            <h3 class="card-name">${esc(t.naam)}</h3>
            ${t.soort ? `<div class="card-tags"><span class="card-tag">${esc(TYPE_EMOJI[t.soort] || '')} ${esc(t.soort)}</span></div>` : ''}
            ${t.notitie ? `<p class="card-note">${esc(t.notitie)}</p>` : ''}
            <time class="card-date">${esc(t.datum)}${pend.has(t.id) ? '<span class="card-pending">• niet gesynct</span>' : ''}</time>
          </div>
          <button class="card-del" type="button" data-act="ask-del" data-id="${esc(t.id)}" aria-label="Verwijder ${esc(t.naam)}" title="Verwijder">×</button>
        </article>`).join('');
    }

    const n = filtered.length;
    document.getElementById('count').textContent = `${n} thee${n !== 1 ? 'ën' : ''}`;
  }

  // ── Delete confirm ──
  function askDelete(id) {
    confirmingId = id;
    const card = document.querySelector(`.card[data-id="${cssEsc(id)}"]`);
    if (!card) return;
    const bar = document.createElement('div');
    bar.className = 'card-confirm';
    bar.innerHTML = `
      <span>Verwijderen uit je journaal?</span>
      <div class="confirm-actions">
        <button class="btn-confirm-no"  type="button" data-act="cancel-del">Nee</button>
        <button class="btn-confirm-yes" type="button" data-act="confirm-del" data-id="${esc(id)}">Verwijder</button>
      </div>`;
    card.appendChild(bar);
  }
  function cancelDelete() {
    confirmingId = null;
    document.querySelectorAll('.card-confirm').forEach(el => el.remove());
  }

  // ── Bottom sheet ──
  function openSheet() {
    lastFocus = document.activeElement;
    document.getElementById('backdrop').classList.add('open');
    document.getElementById('sheet').classList.add('open');
    document.getElementById('fab').classList.add('hidden');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('naam').focus(), 360);
  }
  function closeSheet() {
    document.getElementById('backdrop').classList.remove('open');
    document.getElementById('sheet').classList.remove('open');
    document.getElementById('fab').classList.remove('hidden');
    document.body.style.overflow = '';
    if (lastFocus && lastFocus.focus) lastFocus.focus();
  }
  function resetForm() {
    document.getElementById('naam').value = '';
    document.getElementById('notitie').value = '';
    document.querySelectorAll('.rating-btn').forEach(b => { b.classList.remove('selected'); b.setAttribute('aria-pressed', 'false'); });
    document.querySelectorAll('.type-chip').forEach(b => { b.classList.remove('selected'); b.setAttribute('aria-pressed', 'false'); });
    selectedRating = null; selectedType = null;
  }

  // ── Backend ──
  async function sendOp(payload) {
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
  }
  function enqueue(item) { queue.push(item); saveQueue(); updateBanner(); }
  async function flushQueue() {
    if (!queue.length || !navigator.onLine) { updateBanner(); return; }
    updateBanner();
    for (const item of queue.slice()) {
      try {
        await sendOp(item.op === 'add' ? { action: 'add', ...item.tea } : { action: 'delete', id: item.id });
        queue = queue.filter(q => q !== item); saveQueue(); updateBanner();
      } catch (_) { break; }
    }
    if (queue.length === 0) toast('✓ Gesynchroniseerd');
    updateBanner();
  }

  // ── Load ──
  async function loadTeas(isManual) {
    const btn = document.getElementById('refreshBtn');
    if (isManual) { btn.classList.remove('spinning'); void btn.offsetWidth; btn.classList.add('spinning'); }
    if (allTeas.length === 0) showSkeleton();
    try {
      const res = await fetch(SCRIPT_URL, { cache: 'no-store' });
      const data = await res.json();
      const server = Array.isArray(data) ? data.slice().reverse() : [];
      const adds = queue.filter(q => q.op === 'add').map(q => q.tea);
      const delIds = new Set(queue.filter(q => q.op === 'delete').map(q => q.id));
      const seen = new Set(adds.map(t => t.id));
      allTeas = adds.concat(server.filter(t => !seen.has(t.id) && !delIds.has(t.id)));
      cacheTeas(); renderList();
      if (isManual) toast('Bijgewerkt');
    } catch (e) {
      if (allTeas.length === 0) {
        document.getElementById('teaList').innerHTML =
          '<div class="empty"><div class="e-icon">📡</div><p>Kan niet laden. Controleer je verbinding of de Apps Script-URL.</p></div>';
        document.getElementById('count').textContent = '';
      } else { renderList(); if (isManual) toast('Offline — cache getoond'); }
    } finally {
      updateBanner();
      setTimeout(() => btn.classList.remove('spinning'), 700);
    }
  }

  // ── Add ──
  async function addTea() {
    const naamEl = document.getElementById('naam');
    const notitieEl = document.getElementById('notitie');
    const naam = naamEl.value.trim();
    if (!naam)           { toast('Vul een naam in ☝️'); naamEl.focus(); return; }
    if (!selectedRating) { toast('Kies een beoordeling'); return; }

    const tea = {
      id:      Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
      naam, soort: selectedType || '', rating: selectedRating,
      notitie: notitieEl.value.trim(),
      datum:   new Date().toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' })
    };

    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Opslaan…';

    allTeas.unshift(tea); cacheTeas();
    try { await sendOp({ action: 'add', ...tea }); toast('✓ Toegevoegd aan je journaal'); }
    catch (e) { enqueue({ op: 'add', tea }); toast('Offline — opgeslagen, sync volgt'); }

    closeSheet();
    resetForm();
    renderList();
    btn.disabled = false; btn.textContent = 'Opslaan in journaal';
  }

  // ── Delete ──
  async function deleteTea(id) {
    cancelDelete();
    allTeas = allTeas.filter(t => t.id !== id);
    cacheTeas(); renderList();
    const wasQueuedAdd = queue.some(q => q.op === 'add' && q.tea.id === id);
    if (wasQueuedAdd) {
      queue = queue.filter(q => !(q.op === 'add' && q.tea.id === id));
      saveQueue(); updateBanner(); toast('Verwijderd'); return;
    }
    try { await sendOp({ action: 'delete', id }); toast('Verwijderd'); }
    catch (e) { enqueue({ op: 'delete', id }); toast('Offline — verwijderd, sync volgt'); }
  }

  // ── Wiring ──
  document.getElementById('typeChips').addEventListener('click', e => { const b = e.target.closest('.type-chip'); if (b) selectType(b); });
  document.getElementById('ratingRow').addEventListener('click', e => { const b = e.target.closest('.rating-btn'); if (b) selectRating(b); });
  document.getElementById('ratingFilterBar').addEventListener('click', e => { const b = e.target.closest('button'); if (b) setFilter(b); });
  document.getElementById('typeFilterBar').addEventListener('click', e => { const b = e.target.closest('.type-pill'); if (b) setTypeFilter(b); });
  document.getElementById('saveBtn').addEventListener('click', addTea);
  document.getElementById('refreshBtn').addEventListener('click', () => loadTeas(true));
  document.getElementById('fab').addEventListener('click', openSheet);
  document.getElementById('backdrop').addEventListener('click', closeSheet);
  document.querySelector('.sheet-handle').addEventListener('click', closeSheet);
  document.getElementById('naam').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addTea(); } });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('sheet').classList.contains('open')) closeSheet();
      else if (confirmingId) cancelDelete();
    }
  });

  document.getElementById('teaList').addEventListener('click', e => {
    const el = e.target.closest('[data-act]'); if (!el) return;
    const act = el.dataset.act;
    if (act === 'ask-del')        { cancelDelete(); askDelete(el.dataset.id); }
    else if (act === 'cancel-del')  cancelDelete();
    else if (act === 'confirm-del') deleteTea(el.dataset.id);
  });

  window.addEventListener('online',  () => { updateBanner(); flushQueue().then(() => loadTeas(false)); });
  window.addEventListener('offline', updateBanner);
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') loadTeas(false); });

  // ── Init ──
  allTeas = loadStore(CACHE_KEY, []);
  queue   = loadStore(QUEUE_KEY, []);
  restoreFilters();
  if (allTeas.length) renderList(); else showSkeleton();
  updateBanner();
  flushQueue();
  loadTeas(false);

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }
</script>
</body>
</html>
