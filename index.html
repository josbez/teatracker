<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#243B1A">
  <title>Theemaas Dagboek</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:      #FAF7F2;
      --paper:      #F2EDE4;
      --green:      #243B1A;
      --green-mid:  #3A5E28;
      --green-soft: #EEF4E8;
      --amber:      #B8883A;
      --amber-soft: #FDF5E2;
      --red:        #9E3030;
      --red-soft:   #FAECEC;
      --text:       #2C2420;
      --muted:      #9A9088;
      --border:     #E0D8CE;
      --white:      #FFFFFF;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    /* ── Header ── */
    header {
      background: var(--green);
      color: var(--cream);
      padding: env(safe-area-inset-top, 16px) 20px 20px;
      padding-top: calc(env(safe-area-inset-top, 0px) + 24px);
      text-align: center;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    header p {
      font-size: 12px;
      font-weight: 300;
      opacity: 0.6;
      margin-top: 3px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* ── Add form ── */
    .add-section {
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      padding: 20px;
    }

    .section-label {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      color: var(--green);
      margin-bottom: 14px;
      font-style: italic;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      background: var(--white);
      color: var(--text);
      margin-bottom: 12px;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color 0.15s;
    }

    input[type="text"]::placeholder, textarea::placeholder { color: var(--border); }

    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--green-mid);
    }

    textarea { height: 68px; resize: none; line-height: 1.5; }

    /* ── Rating buttons ── */
    .rating-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .rating-btn {
      padding: 14px 6px 12px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--white);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      user-select: none;
    }

    .rating-btn:active { transform: scale(0.96); }

    .rating-btn .emoji { font-size: 26px; line-height: 1; }
    .rating-btn .label { font-size: 11px; color: var(--muted); font-weight: 400; letter-spacing: 0.3px; }

    .rating-btn.selected[data-rating="👍"] { border-color: var(--green-mid); background: var(--green-soft); }
    .rating-btn.selected[data-rating="👎"] { border-color: var(--red);       background: var(--red-soft);   }
    .rating-btn.selected[data-rating="😐"] { border-color: var(--amber);     background: var(--amber-soft); }

    .rating-btn.selected .label { font-weight: 500; }
    .rating-btn.selected[data-rating="👍"] .label { color: var(--green-mid); }
    .rating-btn.selected[data-rating="👎"] .label { color: var(--red); }
    .rating-btn.selected[data-rating="😐"] .label { color: var(--amber); }

    /* ── Type chips ── */
    .type-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .type-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 14px;
    }

    .type-chip {
      padding: 7px 13px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      color: var(--text);
      user-select: none;
    }

    .type-chip:active { transform: scale(0.95); }

    .type-chip.selected {
      background: var(--green);
      color: var(--cream);
      border-color: var(--green);
      font-weight: 500;
    }

    /* ── Type badge on card ── */
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }

    .card-type {
      font-size: 11px;
      color: var(--muted);
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2px 8px;
      white-space: nowrap;
    }

    /* ── Type filter row ── */
    .filter-bar-type {
      display: flex;
      gap: 7px;
      padding: 8px 20px 12px;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .filter-bar-type::-webkit-scrollbar { display: none; }

    /* ── Submit button ── */
    .btn-save {
      width: 100%;
      padding: 15px;
      background: var(--green);
      color: var(--cream);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-save:active  { transform: scale(0.99); opacity: 0.85; }
    .btn-save:disabled { opacity: 0.45; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 7px;
      padding: 14px 20px;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
      padding: 7px 15px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--green);
      color: var(--cream);
      border-color: var(--green);
      font-weight: 500;
    }

    /* ── Tea list ── */
    .list-wrap { padding: 14px 20px 0; }

    .count {
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 12px;
      letter-spacing: 0.3px;
    }

    .tea-card {
      background: var(--white);
      border-radius: 14px;
      padding: 15px 16px;
      margin-bottom: 9px;
      border: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 13px;
      animation: fadeSlide 0.25s ease both;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-emoji { font-size: 30px; flex-shrink: 0; margin-top: 1px; line-height: 1; }

    .card-body { flex: 1; min-width: 0; }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 3px;
      word-break: break-word;
    }

    .card-note {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .card-date {
      font-size: 11px;
      color: var(--border);
      font-weight: 300;
    }

    .card-del {
      background: none;
      border: none;
      color: var(--border);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 2px 4px;
      flex-shrink: 0;
      transition: color 0.15s;
      font-weight: 300;
    }

    .card-del:hover { color: var(--red); }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 56px 20px;
      color: var(--muted);
    }

    .empty .e-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.7; }
    .empty p { font-size: 15px; font-weight: 300; line-height: 1.5; }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 300;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: var(--green);
      color: var(--cream);
      padding: 11px 22px;
      border-radius: 22px;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      white-space: nowrap;
      pointer-events: none;
      box-shadow: 0 4px 20px rgba(36,59,26,0.3);
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>🍵 Theemaas</h1>
  <p>Persoonlijk theejournaal</p>
</header>

<div class="add-section">
  <div class="section-label">Thee toevoegen</div>

  <input type="text" id="naam" placeholder="Naam van de thee…" autocomplete="off" autocorrect="off" spellcheck="false">

  <div class="type-label">Soort</div>
  <div class="type-chips">
    <button class="type-chip" data-type="Groen"   onclick="selectType(this)">🌿 Groen</button>
    <button class="type-chip" data-type="Zwart"   onclick="selectType(this)">🖤 Zwart</button>
    <button class="type-chip" data-type="Oolong"  onclick="selectType(this)">🌸 Oolong</button>
    <button class="type-chip" data-type="Wit"     onclick="selectType(this)">🤍 Wit</button>
    <button class="type-chip" data-type="Jasmijn" onclick="selectType(this)">🌺 Jasmijn</button>
    <button class="type-chip" data-type="Kruiden" onclick="selectType(this)">🌱 Kruiden</button>
    <button class="type-chip" data-type="Rooibos" onclick="selectType(this)">❤️ Rooibos</button>
    <button class="type-chip" data-type="Pu-erh"  onclick="selectType(this)">🍂 Pu-erh</button>
  </div>

  <div class="rating-row">
    <button class="rating-btn" data-rating="👍" onclick="selectRating(this)">
      <span class="emoji">👍</span><span class="label">Lekker</span>
    </button>
    <button class="rating-btn" data-rating="😐" onclick="selectRating(this)">
      <span class="emoji">😐</span><span class="label">Zo-zo</span>
    </button>
    <button class="rating-btn" data-rating="👎" onclick="selectRating(this)">
      <span class="emoji">👎</span><span class="label">Niet lekker</span>
    </button>
  </div>

  <textarea id="notitie" placeholder="Smaaknotitie (optioneel)…"></textarea>

  <button class="btn-save" id="saveBtn" onclick="addTea()">Opslaan</button>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all" onclick="setFilter(this)">Alle</button>
  <button class="filter-btn" data-filter="👍"  onclick="setFilter(this)">👍 Lekker</button>
  <button class="filter-btn" data-filter="😐"  onclick="setFilter(this)">😐 Zo-zo</button>
  <button class="filter-btn" data-filter="👎"  onclick="setFilter(this)">👎 Niet lekker</button>
</div>

<div class="filter-bar-type">
  <button class="filter-btn active" data-type-filter="all" onclick="setTypeFilter(this)">Alle soorten</button>
  <button class="filter-btn" data-type-filter="Groen"   onclick="setTypeFilter(this)">🌿 Groen</button>
  <button class="filter-btn" data-type-filter="Zwart"   onclick="setTypeFilter(this)">🖤 Zwart</button>
  <button class="filter-btn" data-type-filter="Oolong"  onclick="setTypeFilter(this)">🌸 Oolong</button>
  <button class="filter-btn" data-type-filter="Wit"     onclick="setTypeFilter(this)">🤍 Wit</button>
  <button class="filter-btn" data-type-filter="Jasmijn" onclick="setTypeFilter(this)">🌺 Jasmijn</button>
  <button class="filter-btn" data-type-filter="Kruiden" onclick="setTypeFilter(this)">🌱 Kruiden</button>
  <button class="filter-btn" data-type-filter="Rooibos" onclick="setTypeFilter(this)">❤️ Rooibos</button>
  <button class="filter-btn" data-type-filter="Pu-erh"  onclick="setTypeFilter(this)">🍂 Pu-erh</button>
</div>

<div class="list-wrap">
  <div class="loading">Laden…</div>
  <div id="teaList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ⚠️ Vervang dit door jouw eigen Apps Script URL na stap 2
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx7GxpM5wqeBOWm1vhyyqvdnQuiu42ruFOyACrSLrqzKOSeT-283U66AFASrWGo10p1og/exec';

  let allTeas = [];
  let selectedRating = null;
  let selectedType   = null;
  let currentFilter  = 'all';
  let currentTypeFilter = 'all';

  // ── Type selectie ──
  function selectType(btn) {
    const already = btn.classList.contains('selected');
    document.querySelectorAll('.type-chip').forEach(b => b.classList.remove('selected'));
    if (!already) { btn.classList.add('selected'); selectedType = btn.dataset.type; }
    else selectedType = null;
  }

  // ── Rating selectie ──
  function selectRating(btn) {
    document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedRating = btn.dataset.rating;
  }

  // ── Rating filter ──
  function setFilter(btn) {
    document.querySelectorAll('.filter-bar .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderList();
  }

  // ── Type filter ──
  function setTypeFilter(btn) {
    document.querySelectorAll('.filter-bar-type .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTypeFilter = btn.dataset.typeFilter;
    renderList();
  }

  // ── Toast ──
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2400);
  }

  // ── Escape HTML ──
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Laden ──
  async function loadTeas() {
    try {
      const res = await fetch(SCRIPT_URL);
      const data = await res.json();
      allTeas = data.reverse();
      renderList();
    } catch(e) {
      document.querySelector('.loading').textContent = 'Kan niet laden — controleer de URL in het script.';
    }
  }

  // ── Renderen ──
  function renderList() {
    document.querySelector('.loading').style.display = 'none';

    let filtered = allTeas;
    if (currentFilter !== 'all')     filtered = filtered.filter(t => t.rating === currentFilter);
    if (currentTypeFilter !== 'all') filtered = filtered.filter(t => t.soort  === currentTypeFilter);

    const list = document.getElementById('teaList');

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="e-icon">🍃</div>
          <p>Geen theeën in deze categorie.</p>
        </div>`;
    } else {
      list.innerHTML = filtered.map((t, i) => `
        <div class="tea-card" style="animation-delay:${i * 30}ms">
          <div class="card-emoji">${t.rating}</div>
          <div class="card-body">
            <div class="card-name">${esc(t.naam)}</div>
            <div class="card-meta">
              ${t.soort ? `<span class="card-type">${esc(t.soort)}</span>` : ''}
            </div>
            ${t.notitie ? `<div class="card-note">${esc(t.notitie)}</div>` : ''}
            <div class="card-date">${t.datum}</div>
          </div>
          <button class="card-del" onclick="deleteTea('${t.id}')" title="Verwijder">×</button>
        </div>
      `).join('');
    }

    // teller
    const count = document.querySelector('.count');
    if (count) count.remove();
    const countEl = document.createElement('div');
    countEl.className = 'count';
    countEl.textContent = `${filtered.length} thee${filtered.length !== 1 ? 'ën' : ''}`;
    list.parentElement.insertBefore(countEl, list);
  }

  // ── Toevoegen ──
  async function addTea() {
    const naam = document.getElementById('naam').value.trim();
    if (!naam)           { toast('Vul een naam in ☝️'); return; }
    if (!selectedRating) { toast('Kies een beoordeling'); return; }

    const tea = {
      id:      Date.now().toString(),
      naam,
      soort:   selectedType || '',
      rating:  selectedRating,
      notitie: document.getElementById('notitie').value.trim(),
      datum:   new Date().toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' })
    };

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Opslaan…';

    try {
      await fetch(SCRIPT_URL, {
        method:  'POST',
        mode:    'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body:    JSON.stringify({ action: 'add', ...tea })
      });

      allTeas.unshift(tea);
      renderList();

      document.getElementById('naam').value    = '';
      document.getElementById('notitie').value = '';
      document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
      document.querySelectorAll('.type-chip').forEach(b => b.classList.remove('selected'));
      selectedRating = null;
      selectedType   = null;

      toast('✓ Thee opgeslagen');
    } catch(e) {
      toast('Fout bij opslaan');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Opslaan';
    }
  }

  // ── Verwijderen ──
  async function deleteTea(id) {
    if (!confirm('Deze thee verwijderen?')) return;

    await fetch(SCRIPT_URL, {
      method:  'POST',
      mode:    'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body:    JSON.stringify({ action: 'delete', id })
    });

    allTeas = allTeas.filter(t => t.id !== id);
    renderList();
    toast('Verwijderd');
  }

  loadTeas();
</script>
</body>
</html>
